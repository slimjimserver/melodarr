services:
  melodarr:
    image: slimjimserver/melodarr:latest
    container_name: melodarr
    ports:
      - "5056:5056"
    volumes:
      - ./data:/app/data
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      MELODARR_DATABASE: /app/data/melodarr.db
      MELODARR_CACHE_DATABASE: /app/data/cache/metadata.db
    restart: unless-stopped
