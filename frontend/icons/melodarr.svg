         C235 174 250 197 244 223
         C239 246 217 256 190 264
         C220 269 244 285 256 305
         C268 285 292 269 322 264
         C295 256 273 246 268 223
         C262 197 277 174 311 168
         C345 162 377 170 396 195
         C413 217 413 250 389 266"
      stroke-width="38"
    />
    <path d="M104 341H408" stroke-width="14"/>
    <path d="M104 382H408" stroke-width="30"/>
  </g>

  <circle cx="123" cy="266" r="22" fill="#EDEDF0"/>
  <circle cx="389" cy="266" r="22" fill="#7C87E7"/>
