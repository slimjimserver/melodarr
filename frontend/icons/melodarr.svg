<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Melodarr</title>
  <desc id="desc">A sideways alto clef with curled lobes shaped like a lowercase M.</desc>
  <defs>
    <linearGradient id="background" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171933"/>
      <stop offset="0.56" stop-color="#090a12"/>
      <stop offset="1" stop-color="#050506"/>
    </linearGradient>
    <linearGradient id="mark" x1="92" y1="158" x2="420" y2="398" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EDEDF0"/>
      <stop offset="0.48" stop-color="#B7BDF8"/>
      <stop offset="1" stop-color="#7681E4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(142 96) rotate(50) scale(340)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7681E4" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#5E6AD2" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="65" y="132" width="382" height="288" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#020203" flood-opacity="0.72"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#background)"/>
