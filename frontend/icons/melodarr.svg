  <rect x="16" y="16" width="480" height="480" rx="98" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="2"/>

  <g fill="none" stroke="url(#mark)" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <path
