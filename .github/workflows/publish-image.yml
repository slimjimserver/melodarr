name: Build and publish image to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'tests/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/publish-image.yml'
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: slimjimserver/melodarr

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish_image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build image
        run: docker build --file Dockerfile --tag "$IMAGE_NAME:$GITHUB_SHA" .

      - name: Test image
        run: docker run --rm "$IMAGE_NAME:$GITHUB_SHA" python -m unittest discover -s tests -v

      - name: Test default rootless runtime
        run: |
          docker run --rm \
            "$IMAGE_NAME:$GITHUB_SHA" \
            sh -ec 'test "$(id -u)" = 1000 && test "$(id -g)" = 1000 && python -c "from backend.storage import init_db; from backend.api_cache import init_cache_db; from backend.config import load_session_secret; init_db(); init_cache_db(); load_session_secret()" && test -f /app/data/melodarr.db && test -f /app/data/cache/metadata.db && test -f /app/data/session-secret.key'

      - name: Test Unraid user override
        run: |
          data_dir="$(mktemp -d)"
          docker run --rm --user 0:0 --volume "$data_dir:/app/data" "$IMAGE_NAME:$GITHUB_SHA" chown 99:100 /app/data
          docker run --rm \
            --user 99:100 \
            --volume "$data_dir:/app/data" \
            "$IMAGE_NAME:$GITHUB_SHA" \
            sh -ec 'test "$(id -u)" = 99 && test "$(id -g)" = 100 && python -c "from backend.storage import init_db; from backend.api_cache import init_cache_db; from backend.config import load_session_secret; init_db(); init_cache_db(); load_session_secret()"'

      - name: Test Unraid container startup
        run: |
          data_dir="$(mktemp -d)"
          docker run --rm --user 0:0 --volume "$data_dir:/app/data" "$IMAGE_NAME:$GITHUB_SHA" chown 99:100 /app/data
          container_id="$(docker run --detach --user 99:100 --volume "$data_dir:/app/data" --workdir /tmp "$IMAGE_NAME:$GITHUB_SHA")"
          trap 'docker logs "$container_id"; docker rm --force "$container_id" >/dev/null' EXIT
          for attempt in $(seq 1 30); do
            if docker exec "$container_id" python -c 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:5056/api/auth/status", timeout=1).read()'; then
              exit 0
            fi
            if [ "$(docker inspect --format '{{.State.Running}}' "$container_id")" != true ]; then
              exit 1
            fi
            sleep 1
          done
          exit 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: slimjimserver
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Publish main image
        if: github.event_name != 'release' && github.ref == 'refs/heads/main'
        run: |
          docker tag "$IMAGE_NAME:$GITHUB_SHA" "$IMAGE_NAME:main"
          docker push "$IMAGE_NAME:main"

      - name: Publish release image
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          docker tag "$IMAGE_NAME:$GITHUB_SHA" "$IMAGE_NAME:$RELEASE_TAG"
          docker push "$IMAGE_NAME:$RELEASE_TAG"

          if [[ "$IS_PRERELEASE" != "true" ]]; then
            docker tag "$IMAGE_NAME:$GITHUB_SHA" "$IMAGE_NAME:latest"
            docker push "$IMAGE_NAME:latest"
          fi
