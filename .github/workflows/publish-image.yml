name: Build and publish image to Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'tests/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/publish-image.yml'
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: slimjimserver/melodarr

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish_image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build image
        run: docker build --file Dockerfile --tag "$IMAGE_NAME:$GITHUB_SHA" .

      - name: Test image
        run: docker run --rm "$IMAGE_NAME:$GITHUB_SHA" python -m unittest discover -s tests -v

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: slimjimserver
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Publish main image
        if: github.event_name != 'release' && github.ref == 'refs/heads/main'
        run: |
          docker tag "$IMAGE_NAME:$GITHUB_SHA" "$IMAGE_NAME:main"
          docker push "$IMAGE_NAME:main"

      - name: Publish release image
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          docker tag "$IMAGE_NAME:$GITHUB_SHA" "$IMAGE_NAME:$RELEASE_TAG"
          docker push "$IMAGE_NAME:$RELEASE_TAG"

          if [[ "$IS_PRERELEASE" != "true" ]]; then
            docker tag "$IMAGE_NAME:$GITHUB_SHA" "$IMAGE_NAME:latest"
            docker push "$IMAGE_NAME:latest"
          fi
